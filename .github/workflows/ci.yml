name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Checks ──────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check imports
        run: python -c "import main; print('✓ All imports valid')"
        env:
          SECRET_KEY: ci-test-key
          DATABASE_URL: sqlite:///./ci-test.db

  # ── Frontend Checks ─────────────────────────────────────────────────
  frontend:
    name: Frontend (React + TypeScript)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build production bundle
        run: npm run build

  # ── Security Scan ───────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          echo "Scanning for hardcoded secrets..."
          ! grep -rn "rzp_live_\|rzp_test_[a-zA-Z0-9]\{14\}\|sk_live_\|sk_test_" \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" \
            . || echo "⚠️ Possible secrets found — review above matches"

      - name: Verify .env not tracked
        run: |
          if git ls-files --error-unmatch backend/.env 2>/dev/null; then
            echo "❌ backend/.env is tracked! Remove it."
            exit 1
          fi
          echo "✓ No .env files tracked"
